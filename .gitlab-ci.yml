image: node:24

stages:
  - build
  - test
  - deploy

cache:
  paths:
    - node_modules/

before_script:
  - npm ci

build-job:
  stage: build
  script:
    - echo "Compiling the code..."
    - npm run check
    - echo "Compile complete."

unit-test-job:
  stage: test
  script:
    - echo "Running unit tests... "
    - npm run vitest:unit

lint-test-job:
  stage: test
  script:
    - echo "Linting code..."
    - npm run lint
