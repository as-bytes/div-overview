apply plugin: 'application'
apply plugin: 'groovy'

application {
    mainClassName = 'com.asbytes.Main'
}

repositories {
    flatDir { dirs 'lib' }
}

dependencies {
	implementation fileTree(dir: 'lib', include: ['*.jar'])
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(11)
    }
}

tasks.processResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
tasks.processTestResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

task openReport(type: Exec) {
    commandLine 'cmd', '/c', "start ${project.file('summaries/summary.html')}"
}

task runMain(type: JavaExec) {
    main = 'com.asbytes.Main'
    classpath sourceSets.main.runtimeClasspath
    // args 'argument1', 'argument2' // List of arguments to pass to the main method
}

sourceSets {
	main {
		groovy {
			srcDirs = ['src/main/groovy']
		}
		// resources {
			// srcDir "src/main/resources"
		// }
	}
	test {
		groovy {
			srcDirs = ['src/test/groovy']
		}
		resources {
			srcDir "src/test/resources"
		}
	}
}